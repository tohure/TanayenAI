name: CD — Main (Release)

on:
  workflow_run:
    workflows: [ "CI" ]
    branches: [ main ]
    types: [ completed ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Android: Release firmado ───────────────────────────────────────────────
  release-android:
    name: Android Release → Firebase
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4.2.2
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup JDK 21
        uses: actions/setup-java@v4.7.0
        with:
          java-version: "21"
          distribution: "zulu"

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@v5

      - name: Run all tests antes de release
        run: ./gradlew :shared:allTests :androidApp:testReleaseUnitTest

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > androidApp/keystore.jks

      - name: Decode google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 -d > androidApp/google-services.json

      - name: Build AAB release (firmado)
        run: ./gradlew :androidApp:bundleRelease
        env:
          KEYSTORE_PATH:     androidApp/keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS:         ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:      ${{ secrets.KEY_PASSWORD }}

      - name: Upload AAB to Firebase (release-testers group)
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId:        ${{ secrets.FIREBASE_APP_ID_ANDROID }}
          token:        ${{ secrets.FIREBASE_TOKEN }}
          groups:       release-testers
          file:         androidApp/build/outputs/bundle/release/androidApp-release.aab
          releaseNotes: "Release ${{ github.ref_name }} — ${{ github.sha }}"

      - name: Upload AAB as artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: release-aab
          path: androidApp/build/outputs/bundle/release/*.aab
          retention-days: 30

