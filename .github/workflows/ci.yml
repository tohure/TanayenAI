name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

jobs:
  # ── Lint + Tests + Android Build ──────────────────────────────────────────
  android-checks:
    name: Android — Lint + Tests + Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Setup JDK 21
        uses: actions/setup-java@v4.7.0
        with:
          java-version: "21"
          distribution: "zulu"

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@v5

      - name: Install ktlint
        run: |
          curl -sSLO https://github.com/pinterest/ktlint/releases/download/1.5.0/ktlint
          chmod a+x ktlint
          sudo mv ktlint /usr/local/bin/

      - name: Ktlint check
        run: ./gradlew ktlintCheck

      - name: Run shared unit tests
        run: ./gradlew :shared:allTests

      - name: Decode google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 -d > androidApp/google-services.json

      - name: Build Android debug APK
        run: ./gradlew :androidApp:assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: debug-apk
          path: androidApp/build/outputs/apk/debug/*.apk
          retention-days: 7

  # ── Build iOS — Solo en Pull Requests ─────────────────────────────────────
  ios-build:
    name: iOS — Build Simulator
    runs-on: macos-15
    needs: android-checks
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Setup JDK 21
        uses: actions/setup-java@v4.7.0
        with:
          java-version: "21"
          distribution: "zulu"

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@v5

      - name: Cache Kotlin Native
        uses: actions/cache@v4.2.3
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: |
            konan-${{ runner.os }}-

      - name: Build KMP iOS framework
        run: ./gradlew :shared:linkDebugFrameworkIosSimulatorArm64

      - name: Build iOS app (simulator)
        run: |
          xcodebuild build \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            | xcpretty
