name: CI/CD

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

# Cancela runs superados del mismo ref (PRs/develop). Nunca cancela un deploy en main.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Lint + Tests (siempre: PR y push) ─────────────────────────────────────
  checks:
    name: Lint + Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "zulu"

      - uses: gradle/actions/setup-gradle@v5

      - name: Install ktlint
        run: |
          curl -sSLO https://github.com/pinterest/ktlint/releases/download/1.5.0/ktlint
          chmod a+x ktlint
          sudo mv ktlint /usr/local/bin/

      - name: Ktlint check
        run: ./gradlew ktlintCheck

      - name: Run shared unit tests
        run: ./gradlew :shared:allTests

  # ── Android Build (solo PRs — verificación antes de merge) ────────────────
  android-pr:
    name: Android — Build PR
    runs-on: ubuntu-latest
    needs: checks
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "zulu"

      - uses: gradle/actions/setup-gradle@v5

      - name: Decode google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 -d > androidApp/google-services.json

      - name: Build Android debug APK
        run: ./gradlew :androidApp:assembleDebug

      - uses: actions/upload-artifact@v4.6.2
        with:
          name: debug-apk
          path: androidApp/build/outputs/apk/debug/*.apk
          retention-days: 7

  # ── iOS Build (solo PRs — macOS runner es caro) ───────────────────────────
  ios-pr:
    name: iOS — Build Simulator
    runs-on: macos-15
    needs: checks
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "zulu"

      - uses: gradle/actions/setup-gradle@v5

      - uses: actions/cache@v4.2.3
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: konan-${{ runner.os }}-

      - name: Build KMP iOS framework
        run: ./gradlew :shared:linkDebugFrameworkIosSimulatorArm64

      - name: Build iOS app (simulator)
        run: |
          xcodebuild build \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            | xcpretty

  # ── CD: Release firmado (push a main) ─────────────────────────────────────
  # Firebase App Distribution se dispara ÚNICAMENTE aquí: tras mergear un PR
  # (ya verificado por checks/android-pr/ios-pr) y hacer push a main.
  release-main:
    name: Android Release → Firebase (main)
    runs-on: ubuntu-latest
    needs: checks
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "zulu"

      - uses: gradle/actions/setup-gradle@v5

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > androidApp/keystore.jks

      - name: Decode google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 -d > androidApp/google-services.json

      - name: Build AAB release (firmado)
        run: ./gradlew :androidApp:bundleRelease
        env:
          KEYSTORE_PATH:     androidApp/keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS:         ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:      ${{ secrets.KEY_PASSWORD }}

      - name: Upload AAB to Firebase (release-testers)
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId:        ${{ secrets.FIREBASE_APP_ID_ANDROID }}
          token:        ${{ secrets.FIREBASE_TOKEN }}
          groups:       release-testers
          file:         androidApp/build/outputs/bundle/release/androidApp-release.aab
          releaseNotes: "Release ${{ github.ref_name }} — ${{ github.sha }}"

      - uses: actions/upload-artifact@v4.6.2
        with:
          name: release-aab
          path: androidApp/build/outputs/bundle/release/*.aab
          retention-days: 30
