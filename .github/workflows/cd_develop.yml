name: CD — Develop

on:
  workflow_run:
    workflows: [ "CI" ]
    branches: [ develop ]
    types: [ completed ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Android: Firebase App Distribution ────────────────────────────────────
  distribute-android:
    name: Android → Firebase App Distribution
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4.2.2
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup JDK 21
        uses: actions/setup-java@v4.7.0
        with:
          java-version: "21"
          distribution: "zulu"

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@v5

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > androidApp/keystore.jks

      - name: Decode google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 -d > androidApp/google-services.json

      - name: Build APK debug
        run: ./gradlew :androidApp:assembleDebug
        env:
          KEYSTORE_PATH:     androidApp/keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS:         ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:      ${{ secrets.KEY_PASSWORD }}

      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId:        ${{ secrets.FIREBASE_APP_ID_ANDROID }}
          token:        ${{ secrets.FIREBASE_TOKEN }}
          groups:       testers
          file:         androidApp/build/outputs/apk/debug/androidApp-debug.apk
          releaseNotes: "Build desde develop — ${{ github.sha }}"

