included:
  - iosApp

excluded:
  - iosApp/Pods
  - iosApp/DerivedData

opt_in_rules:
  - empty_count
  - force_unwrapping
  - implicitly_unwrapped_optional

disabled_rules:
  - trailing_whitespace

line_length:
  warning: 120
  error: 150

type_body_length:
  warning: 300
  error: 400

function_body_length:
  warning: 60
  error: 100
